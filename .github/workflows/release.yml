name: Android APK Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle | tr -d '[:space:]')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "App version: $VERSION_NAME (Build $BUILD_NUMBER)"

      - name: Decode Keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 -d > "${{ github.workspace }}/keystore.jks"
            echo "SIGNING_KEY_PATH=${{ github.workspace }}/keystore.jks" >> $GITHUB_ENV
          fi

      - name: Build APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Clean up keystore
        if: always()
        run: rm -f "${{ github.workspace }}/keystore.jks"

      - name: Rename APK
        run: |
          APK_NAME="H-rMal-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}.apk"
          mv app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "APK renamed to: $APK_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          name: H-rMal v${{ steps.version.outputs.version_name }} (Build ${{ steps.version.outputs.build_number }})
          files: H-rMal-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}.apk
          generate_release_notes: true
          make_latest: true
